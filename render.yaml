services:
  - type: web
    name: ninho-smart-home
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
      - key: INTEGRATION_MASTER_KEY
        generateValue: true
      - key: INTEGRATION_KEY_VERSION
        value: v1
      - key: TURNSTILE_REQUIRED
        sync: false
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_HOSTNAME
        sync: false
      - key: TRUST_PROXY
        value: "true"
      - key: REQUIRE_HTTPS
        value: "true"
      - key: APP_URL
        value: https://ninho-smart-home.onrender.com
      - key: SMTP_HOST
        value: smtp.mail.me.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ninho-postgres
          property: connectionString

databases:
  - name: ninho-postgres
    plan: free
    databaseName: ninho
    user: ninho
