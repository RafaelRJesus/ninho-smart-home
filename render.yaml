services:
  - type: web
    name: ninho-smart-home
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
      - key: INTEGRATION_MASTER_KEY
        generateValue: true
      - key: INTEGRATION_KEY_VERSION
        value: v1
      - key: TRUST_PROXY
        value: "true"
      - key: REQUIRE_HTTPS
        value: "true"
      - key: CORS_ORIGIN
        value: https://ninho-smart-home.onrender.com
      - key: DATA_FILE
        value: /tmp/ninho-demo-state.json
      - key: DATABASE_URL
        fromDatabase:
          name: ninho-postgres
          property: connectionString

databases:
  - name: ninho-postgres
    plan: free
    databaseName: ninho
    user: ninho
