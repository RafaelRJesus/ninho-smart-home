name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 08:00 em America/Sao_Paulo (UTC-3).
    - cron: "0 11 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run test:unit

  integration-tests:
    name: API and integration suites
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run test:integration

  postgres-integration:
    name: PostgreSQL domain integration
    environment: ${{ github.event_name == 'pull_request' && 'qa' || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ninho_qa
          POSTGRES_PASSWORD: ninho_qa
          POSTGRES_DB: ninho_qa
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ninho_qa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run test:postgres
        env:
          DATABASE_URL: postgresql://ninho_qa:ninho_qa@127.0.0.1:5432/ninho_qa
          DATABASE_SSL: "false"

  interface-e2e:
    name: Interface E2E desktop and mobile
    environment: ${{ github.event_name == 'pull_request' && 'qa' || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  static-analysis:
    name: Lint and TypeScript contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm audit --audit-level=high

  build:
    name: Production build
    needs: [unit-tests, integration-tests, postgres-integration, interface-e2e, static-analysis, dependency-audit]
    environment: ${{ github.event_name == 'pull_request' && 'qa' || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  smoke-test:
    name: Production smoke test
    needs: build
    environment: qa
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --omit=dev
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - run: npm run test:smoke

  load-test:
    name: Concurrent load test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --omit=dev
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - run: npm run test:stress
        env:
          STRESS_CONNECTIONS: 40
          STRESS_DURATION_SECONDS: 6
          STRESS_MAX_P99_MS: 1500

  daily-report:
    name: Daily status email
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    needs:
      - unit-tests
      - integration-tests
      - postgres-integration
      - interface-e2e
      - static-analysis
      - dependency-audit
      - build
      - smoke-test
      - load-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Send iCloud status report
        env:
          SMTP_HOST: smtp.mail.me.com
          SMTP_PORT: 587
          SMTP_USERNAME: ${{ secrets.ICLOUD_SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.ICLOUD_APP_PASSWORD }}
          EMAIL_TO: rafael.sri@icloud.com
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          POSTGRES_RESULT: ${{ needs.postgres-integration.result }}
          E2E_RESULT: ${{ needs.interface-e2e.result }}
          STATIC_RESULT: ${{ needs.static-analysis.result }}
          AUDIT_RESULT: ${{ needs.dependency-audit.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
          LOAD_RESULT: ${{ needs.load-test.result }}
        run: bash scripts/send-ci-report.sh
