openapi: 3.1.0
info:
  title: Ninho API
  version: 1.9.0
  description: API residencial versionada, autenticada por cookies HttpOnly e segregada por RBAC.
servers:
  - url: /api/v1
paths:
  /auth/login:
    post:
      operationId: login
      responses:
        '200': { description: Sessão criada }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/password/forgot:
    post:
      operationId: requestPasswordReset
      description: Sempre responde de forma genérica para impedir enumeração de contas.
      responses:
        '202': { description: Solicitação recebida }
  /auth/password/reset:
    post:
      operationId: resetPassword
      responses:
        '204': { description: Senha alterada e sessões anteriores invalidadas }
        '400': { description: Token inválido, expirado, usado ou senha fora da política }
  /homes:
    get:
      operationId: listHomes
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Residências autorizadas }
    post:
      operationId: createHome
      security: [{ cookieAuth: [] }]
      responses:
        '201': { description: Residência criada com piso e ambientes iniciais }
  /homes/{homeId}:
    patch:
      operationId: updateHome
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Residência atualizada e versão incrementada }
        '409': { $ref: '#/components/responses/VersionConflict' }
    delete:
      operationId: deleteHome
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { $ref: '#/components/parameters/VersionQuery' }
      responses:
        '204': { description: Residência excluída }
        '409': { description: Versão desatualizada ou última residência do proprietário }
  /homes/{homeId}/floors:
    get:
      operationId: listFloors
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses: { '200': { description: Pisos da residência } }
    post:
      operationId: createFloor
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses: { '201': { description: Piso criado } }
  /homes/{homeId}/floors/{floorId}:
    patch:
      operationId: updateFloor
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { $ref: '#/components/parameters/FloorId' }
      responses:
        '200': { description: Piso atualizado e versão incrementada }
        '409': { $ref: '#/components/responses/VersionConflict' }
    delete:
      operationId: deleteFloor
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { $ref: '#/components/parameters/FloorId' }
        - { $ref: '#/components/parameters/VersionQuery' }
      responses:
        '204': { description: Piso excluído }
        '409': { description: Piso ocupado, último piso ou versão desatualizada }
  /homes/{homeId}/rooms:
    get:
      operationId: listRooms
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Ambientes da residência }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createRoom
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '201': { description: Ambiente criado }
  /homes/{homeId}/devices:
    get:
      operationId: listDevices
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Dispositivos normalizados da residência }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createDevice
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '201': { description: Dispositivo persistido }
  /homes/{homeId}/devices/{deviceId}:
    patch:
      operationId: updateDevice
      description: Atualiza metadados ou envia controles compatíveis (`power`, `brightness`, `temperature`, `color`, `volume`, `mediaAction`, `locked`, `position` e `cameraAction`). Controles aguardam confirmação do provedor antes de persistir; falhas preservam o estado anterior. Fechaduras, portões e câmeras exigem `confirmed: true` e PIN no cabeçalho.
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { name: deviceId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: x-action-pin, in: header, required: false, description: Obrigatório em ações críticas quando configurado no servidor, schema: { type: string, writeOnly: true } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: integer, minimum: 1 }
                requestId: { type: string, maxLength: 80 }
                confirmed: { type: boolean }
                power: { type: boolean }
                brightness: { type: number, minimum: 0, maximum: 100 }
                temperature: { type: number, minimum: 16, maximum: 30 }
                color: { type: string, pattern: '^#[0-9a-fA-F]{6}$' }
                volume: { type: number, minimum: 0, maximum: 100 }
                mediaAction: { type: string, enum: [play, pause, stop, mute, unmute, channel_up, channel_down] }
                locked: { type: boolean }
                position: { type: number, minimum: 0, maximum: 100 }
                cameraAction: { type: string, enum: [privacy_on, privacy_off] }
      responses:
        '200': { description: Dispositivo atualizado com estado final confirmado pelo backend }
        '404': { description: Dispositivo não encontrado na residência }
        '403': { description: Papel insuficiente ou PIN de ação crítica inválido }
        '409': { description: Versão conflitante, confirmação ausente, dispositivo offline ou dispositivo em erro }
        '422': { description: Capacidade não suportada pelo dispositivo }
        '502': { description: O provedor não confirmou o comando; estado anterior preservado }
    delete:
      operationId: deleteDevice
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { name: deviceId, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/VersionQuery' }
      responses:
        '204': { description: Dispositivo excluído }
        '409': { $ref: '#/components/responses/VersionConflict' }
  /homes/{homeId}/dashboard:
    get:
      operationId: getOperationalDashboard
      description: Agrega somente dados autorizados da residência para segurança, conectividade, dispositivos, câmeras, clima, energia, automações, atividade e sistema.
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Snapshot operacional gerado pelo backend }
        '403': { $ref: '#/components/responses/Forbidden' }
  /homes/{homeId}/floorplan:
    get:
      operationId: getFloorplan
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Planta e versão atuais }
    put:
      operationId: saveFloorplan
      description: Persiste uma nova versão da planta com geometria dos cômodos e fundos seguros. Exige controle otimista pela versão atual.
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version, content]
              properties:
                version: { type: integer, minimum: 1 }
                content:
                  type: object
                  required: [floors]
                  properties:
                    floors:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          background: { nullable: true, type: object }
                          rooms:
                            type: object
                            additionalProperties:
                              type: object
                              required: [x, y, width, height]
                              properties:
                                x: { type: number, minimum: 0, maximum: 100 }
                                y: { type: number, minimum: 0, maximum: 100 }
                                width: { type: number, minimum: 5, maximum: 100 }
                                height: { type: number, minimum: 5, maximum: 100 }
      responses:
        '200': { description: Nova versão da planta persistida }
        '400': { description: Estrutura, piso, tipo, tamanho ou conteúdo SVG inválido }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/VersionConflict' }
  /homes/{homeId}/floorplan/versions:
    get:
      operationId: listFloorplanVersions
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Histórico de versões em ordem decrescente }
        '403': { $ref: '#/components/responses/Forbidden' }
  /homes/{homeId}/floorplan/versions/{version}/restore:
    post:
      operationId: restoreFloorplanVersion
      description: Restaura um snapshot como nova versão e preserva o estado substituído no histórico.
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { name: version, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200': { description: Snapshot restaurado em uma nova versão }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Versão não encontrada }
        '409': { $ref: '#/components/responses/VersionConflict' }
  /homes/{homeId}/scenes:
    get:
      operationId: listScenes
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Cenas da residência }
    post:
      operationId: createScene
      description: Cria uma cena administrativa com até 50 ações não críticas validadas contra as capacidades dos dispositivos.
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SceneInput' }
      responses:
        '201': { description: Cena criada }
        '400': { description: Cena ou dispositivo inválido }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Ação crítica não permitida em cena }
  /homes/{homeId}/scenes/{sceneId}/execute:
    post:
      operationId: executeScene
      description: Executa a cena de forma idempotente. O mesmo executionId retorna status duplicate sem repetir comandos.
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { name: sceneId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { executionId: { type: string, maxLength: 200 } }
      responses:
        '200': { description: Execução succeeded, partial, failed ou duplicate com resultado por dispositivo }
        '403': { $ref: '#/components/responses/Forbidden' }
  /homes/{homeId}/automations:
    get:
      operationId: listAutomations
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Automações da residência }
    post:
      operationId: createAutomation
      description: Cria automação manual, agendada ou por mudança de dispositivo, bloqueando ciclos e registrando conflitos.
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutomationInput' }
      responses:
        '201': { description: Automação criada }
        '409': { description: Ciclo de automação detectado }
  /homes/{homeId}/automations/{automationId}/run:
    post:
      operationId: runAutomation
      description: Testa manualmente uma automação ativa usando execução idempotente.
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { name: automationId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Resultado persistido da execução }
        '409': { description: Automação desativada }
  /homes/{homeId}/executions:
    get:
      operationId: listOrchestrationExecutions
      description: Lista a trilha das últimas 200 execuções de cenas e automações da residência.
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Execuções segregadas por residência }
  /homes/{homeId}/notifications:
    get:
      operationId: listNotifications
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Notificações da residência }
  /homes/{homeId}/energy:
    get:
      operationId: getEnergy
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Leituras, total, custo e configuração }
  /homes/{homeId}/assistant:
    post:
      operationId: executeAssistantCommand
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Comando interpretado dentro da residência }
  /homes/{homeId}/events:
    get:
      operationId: streamHomeEvents
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Stream SSE filtrado pela residência }
  /homes/{homeId}/integrations:
    get:
      operationId: listIntegrations
      description: Retorna somente metadados; credenciais cifradas nunca são expostas.
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/HomeId' }]
      responses:
        '200': { description: Integrações configuradas, status e última sincronização }
  /homes/{homeId}/integrations/{provider}/credentials:
    put:
      operationId: saveIntegrationCredentials
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { $ref: '#/components/parameters/Provider' }
      responses:
        '200': { description: Credenciais cifradas e metadados retornados }
        '400': { description: Provedor ou credenciais inválidas }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      operationId: revokeIntegrationCredentials
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { $ref: '#/components/parameters/Provider' }
      responses: { '204': { description: Credencial revogada } }
  /homes/{homeId}/integrations/{provider}/health:
    get:
      operationId: testIntegration
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { $ref: '#/components/parameters/Provider' }
      responses:
        '200': { description: Provedor operacional e latência medida }
        '409': { description: Integração ainda não configurada }
        '502': { description: Falha isolada do provedor }
  /homes/{homeId}/integrations/{provider}/sync:
    post:
      operationId: syncIntegration
      description: Importa ou atualiza dispositivos por identificador externo e inicia a assinatura de eventos.
      security: [{ cookieAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/HomeId' }
        - { $ref: '#/components/parameters/Provider' }
      responses:
        '200': { description: Totais criados/atualizados e horário da sincronização }
        '409': { description: Integração ainda não configurada }
        '502': { description: Falha isolada do provedor }
components:
  schemas:
    SceneInput:
      type: object
      required: [name, actions]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        actions:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            required: [deviceId, controls]
            properties:
              deviceId: { type: string }
              controls: { type: object, additionalProperties: true }
    AutomationInput:
      type: object
      required: [name, sceneId, trigger]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        sceneId: { type: string, format: uuid }
        enabled: { type: boolean, default: true }
        trigger:
          oneOf:
            - { type: object, required: [type], properties: { type: { const: manual } } }
            - { type: object, required: [type, at], properties: { type: { const: schedule }, at: { type: string, pattern: '^([01]\\d|2[0-3]):[0-5]\\d$' }, days: { type: array, items: { type: integer, minimum: 0, maximum: 6 } } } }
            - { $ref: '#/components/schemas/DevicePredicate' }
        conditions: { type: array, items: { $ref: '#/components/schemas/DevicePredicate' } }
    DevicePredicate:
      type: object
      required: [type, deviceId, field, value]
      properties:
        type: { const: device_state }
        deviceId: { type: string }
        field: { type: string }
        operator: { type: string, enum: [eq, neq, gt, gte, lt, lte], default: eq }
        value: {}
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ninho_access
  parameters:
    HomeId:
      name: homeId
      in: path
      required: true
      schema: { type: string, format: uuid }
    FloorId:
      name: floorId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VersionQuery:
      name: version
      in: query
      required: true
      schema: { type: integer, minimum: 1 }
    Provider:
      name: provider
      in: path
      required: true
      schema: { type: string, enum: [tuya, home-assistant] }
  responses:
    Unauthorized:
      description: Sessão ausente ou inválida
    Forbidden:
      description: Usuário sem acesso à residência
    VersionConflict:
      description: A versão enviada está desatualizada; recarregue o recurso antes de tentar novamente
